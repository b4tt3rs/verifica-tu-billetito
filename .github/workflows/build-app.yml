name: Build Android APK & AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build'
        required: true
        default: 'both'
        type: choice
        options:
          - apk
          - aab
          - both

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Decode and create keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > billcheck-release.jks
          ls -lh billcheck-release.jks

      - name: Build and sign release artifacts
        env:
          KEYSTORE: billcheck-release.jks
          ALIAS: ${{ secrets.ALIAS }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          chmod +x build-release.sh
          ./build-release.sh

      - name: List build outputs
        run: |
          echo "=== APK outputs ==="
          ls -lh android/app/build/outputs/apk/release/ || echo "No APK found"
          echo "=== AAB outputs ==="
          ls -lh android/app/build/outputs/bundle/release/ || echo "No AAB found"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed.apk
          path: android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Verify Angular build output
        run: |
          echo "=== Contents of www/ ==="
          ls -la www/ 2>/dev/null || echo "ERROR: www/ directory not found!"
          echo ""

      - name: Copy web app to docs/app
        run: |
          mkdir -p docs/app
          cp -r www/* docs/app/
          echo "=== Contents of docs/app/ ==="
          ls -la docs/app/
          echo "✓ Web app copied successfully"

      - name: Prepare publish directory (bypass .gitignore)
        run: |
          rm -rf publish-dir
          mkdir -p publish-dir
          cp docs/index.html publish-dir/
          cp -r docs/app publish-dir/app
          echo "=== Publish directory structure ==="
          find publish-dir -type f | sort

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-folder
          path: publish-dir/
          retention-days: 7

      - name: Cleanup keystore
        if: always()
        run: rm -f billcheck-release.jks

  create-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-signed.apk
          path: ./apk

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release.aab
          path: ./aab

      - name: Generate version
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release (Versión específica)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: |
            ./apk/app-release-signed.apk
            ./aab/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create/Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Release
          draft: false
          prerelease: false
          files: |
            ./apk/app-release-signed.apk
            ./aab/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-folder
          path: ./deploy-dir

      - name: Verify downloaded structure
        run: |
          echo "=== Contents of deploy-dir ==="
          ls -la ./deploy-dir/
          echo ""
          echo "=== Full tree ==="
          find ./deploy-dir -type f | head -30
          echo ""
          echo "=== Critical checks ==="
          if [ -f "./deploy-dir/index.html" ]; then
            echo "✓ index.html (landing page) found at root"
          else
            echo "✗ ERROR: index.html NOT found at deploy-dir root!"
          fi
          if [ -d "./deploy-dir/app" ]; then
            echo "✓ app/ folder found"
            if [ -f "./deploy-dir/app/index.html" ]; then
              echo "✓ app/index.html found"
            fi
            ls -la ./deploy-dir/app/ | head -10
          else
            echo "✗ ERROR: app/ folder NOT found in deploy-dir!"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-dir
