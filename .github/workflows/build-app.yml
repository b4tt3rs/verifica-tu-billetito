name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build'
        required: true
        default: 'both'
        type: choice
        options:
          - apk
          - aab
          - both

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build Web & Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Angular (production)
        run: npm run build

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > billcheck-release.jks

      - name: Build and sign release artifacts
        env:
          KEYSTORE: billcheck-release.jks
          ALIAS: ${{ secrets.ALIAS }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          chmod +x build-release.sh
          ./build-release.sh

      - name: Cleanup keystore
        if: always()
        run: rm -f billcheck-release.jks

      - name: Upload www artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-app
          path: www/
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed.apk
          path: android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-signed.apk
          path: ./apk

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release.aab
          path: ./aab

      - name: Generate version
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          files: |
            ./apk/app-release-signed.apk
            ./aab/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Release
          files: |
            ./apk/app-release-signed.apk
            ./aab/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: docs

      - name: Download www artifact
        uses: actions/download-artifact@v4
        with:
          name: web-app
          path: ./www

      - name: Prepare deploy folder
        run: |
          mkdir -p deploy
          cp -r docs/* deploy/
          mkdir -p deploy/app
          cp -r www/* deploy/app/
          sed -i 's|<base href="/">|<base href="/verifica-tu-billetito/app/">|' deploy/app/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
