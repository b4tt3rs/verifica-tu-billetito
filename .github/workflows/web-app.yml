name: Build & Deploy Web App

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'angular.json'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Angular (production)
        run: npm run build -- --configuration production

      - name: Copy build to docs/app
        run: |
          mkdir -p docs/app
          cp -r www/* docs/app/
          echo "✓ Copied www/ to docs/app/"

      - name: List build outputs
        run: |
          echo "=== Web app outputs ==="
          ls -lh docs/app/ || echo "No output found"
          echo "=== Files in docs/ ==="
          ls -lh docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
